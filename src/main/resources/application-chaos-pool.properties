# Isolation profile layered on `chaos` for the connection-pool-exhaustion smoke ONLY.
# Shrinks the HikariCP pool and names it so an armed connection leak drains it quickly
# and deterministically, without affecting other waves' smokes (which run under `chaos`
# alone). The leak cap matches the pool size so the pool fully drains, then queries
# time out fast (2s) and increment hikaricp_connections_timeout_total.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=2000
spring.datasource.hikari.pool-name=petclinic-pool
chaos.pool.leak-cap=5
