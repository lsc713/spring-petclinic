# Structured JSON logging for the chaos test bench — consumed by Alloy → Loki.
# Active only under the `chaos` profile, so default runs keep console logging.
logging.structured.format.file=logstash
logging.file.name=logs/petclinic.json

# Emit Prometheus histogram buckets for HTTP server latency (p99 alert needs them).
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Serve actuator (metrics, threaddump, health) from a SEPARATE management port with its
# own thread pool. The thread-saturation fault parks the main (8080) worker pool; without
# this, /actuator/prometheus is starved too and the saturation becomes unscrapeable —
# the metric vanishes under the very condition it must detect. The management pool (8081)
# stays responsive, so ThreadPoolSaturation can fire and the thread dump stays fetchable.
management.server.port=8081

# Correctness oracle probe interval (ms) — how often the known-answer check runs.
chaos.oracle.interval-ms=5000

# Deadlock probe interval (ms) — how often ThreadMXBean is asked for deadlocks.
chaos.deadlock.interval-ms=5000

# Distributed tracing (W5a) — chaos profile only. Sample everything and export spans over
# OTLP to the Tempo container so a trace can localize the slow downstream span.
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
# Boot 4.1 OTLP-tracing export endpoint (note the `opentelemetry.tracing.export` namespace —
# the Boot 3.x `management.otlp.tracing.endpoint` is silently ignored in 4.x).
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces

# Stub downstream dependency (go-httpbin /delay/{n}); armed downstreamLatency calls /delay/2.
chaos.downstream.base-url=http://localhost:8088
chaos.downstream.delay-seconds=2

# Query-plan EXPLAIN probe interval (ms) — how often the owner-search plan is inspected.
chaos.queryplan.interval-ms=5000

# CPU-throttling burner (chaos profile only): how many busy-loop threads to spawn while the
# cpuThrottle scenario is armed, and how often the burner reconciles with the armed state.
chaos.cpu.threads=4
chaos.cpu.interval-ms=2000

# Queue backpressure (W8, chaos profile only): a Kafka producer floods a topic faster than a
# deliberately-slow consumer drains it, so consumer lag (the augmentation signal) climbs. The
# bootstrap-servers/topic config lives here (chaos only), so the default build never connects.
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.auto-offset-reset=earliest
chaos.queue.topic=petclinic.backpressure
chaos.queue.group=petclinic-backpressure
chaos.queue.process-delay-ms=50
chaos.queue.burst=200
chaos.queue.interval-ms=2000
