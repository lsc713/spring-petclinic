# Structured JSON logging for the chaos test bench — consumed by Alloy → Loki.
# Active only under the `chaos` profile, so default runs keep console logging.
logging.structured.format.file=logstash
logging.file.name=logs/petclinic.json

# Emit Prometheus histogram buckets for HTTP server latency (p99 alert needs them).
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Serve actuator (metrics, threaddump, health) from a SEPARATE management port with its
# own thread pool. The thread-saturation fault parks the main (8080) worker pool; without
# this, /actuator/prometheus is starved too and the saturation becomes unscrapeable —
# the metric vanishes under the very condition it must detect. The management pool (8081)
# stays responsive, so ThreadPoolSaturation can fire and the thread dump stays fetchable.
management.server.port=8081

# Correctness oracle probe interval (ms) — how often the known-answer check runs.
chaos.oracle.interval-ms=5000

# Deadlock probe interval (ms) — how often ThreadMXBean is asked for deadlocks.
chaos.deadlock.interval-ms=5000
