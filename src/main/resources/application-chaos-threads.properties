# Isolation profile layered on `chaos` for the thread-saturation smoke ONLY.
# Shrinks the Tomcat worker pool so concurrent load reaches saturation quickly,
# without affecting other waves' smokes (which run under `chaos` alone).
server.tomcat.threads.max=10
server.tomcat.threads.min-spare=2
# Ensure Tomcat thread metrics are registered for the ThreadPoolSaturation alert.
server.tomcat.mbeanregistry.enabled=true
