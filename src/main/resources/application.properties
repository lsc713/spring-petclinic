# database init, supports mysql too
database=h2
spring.sql.init.schema-locations=classpath*:db/${database}/schema.sql
spring.sql.init.data-locations=classpath*:db/${database}/data.sql

# Web
spring.thymeleaf.mode=HTML

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategySnakeCaseImpl
spring.jpa.properties.hibernate.default_batch_fetch_size=16

# Internationalization
spring.messages.basename=messages/messages

# Actuator
# Expose all actuator endpoints for monitoring and management purposes
# Don't do this in production, only for development and testing
management.endpoints.web.exposure.include=*

# Logging
logging.level.org.springframework=INFO
# logging.level.org.springframework.web=DEBUG
# logging.level.org.springframework.context.annotation=TRACE

# Maximum time static resources should be cached
spring.web.resources.cache.cachecontrol.max-age=12h

# Distributed tracing is a chaos-bench-only signal (W5a). OFF by default so production /
# integration-test runs (default profile) incur no tracing or OTLP export.
management.tracing.enabled=false
# spring-boot-starter-opentelemetry pulls micrometer-registry-otlp, which would publish METRICS
# over OTLP. We only want OTLP for TRACING; metrics stay on Prometheus. Disable OTLP metrics export
# everywhere (no stray 4318/v1/metrics pushes in any profile).
management.otlp.metrics.export.enabled=false
# Same reason for LOGS: spring-boot-opentelemetry's OTLP logging export is on by default, building
# an idle OtlpHttpLogRecordExporter + batch processor thread aimed at 4318/v1/logs in every profile.
# We export only traces — turn OTLP logging export off everywhere.
management.logging.export.otlp.enabled=false
