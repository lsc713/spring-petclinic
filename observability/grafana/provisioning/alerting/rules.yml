                    type: gt
                    params: [0]
  - orgId: 1
    name: chaos-thread-saturation
    folder: chaos
    interval: 30s
    rules:
      - uid: chaos-thread-pool-saturation
        title: ThreadPoolSaturation
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          service: petclinic
        annotations:
          summary: Tomcat worker pool saturated (busy threads at configured max, no cause in metrics)
          threaddump: "Augmentation signal: GET /actuator/threaddump — N threads parked in ActiveChaosFaults.maybeBlockWorker localize the saturation."
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              datasource:
                type: prometheus
                uid: prometheus
              expr: 'max(tomcat_threads_busy_threads{service="petclinic"}) / max(tomcat_threads_config_max_threads{service="petclinic"})'
              instant: true
              range: false
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
