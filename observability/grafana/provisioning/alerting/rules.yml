                    type: gt
                    params: [0]
  - orgId: 1
    name: chaos-cpu-throttle
    folder: chaos
    interval: 30s
    rules:
      - uid: chaos-cpu-throttled
        title: CpuThrottled
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: The petclinic container is being CPU CFS-throttled — slow, but CPU usage looks fine (pinned at the limit)
          augmentation: "Augmentation signal: container_cpu_usage_seconds_total rate sits at the CPU limit and looks healthy; only the CFS throttle ratio (container_cpu_cfs_throttled_periods_total / container_cpu_cfs_periods_total) names the cause as a CPU-limit cap (infrastructure / limit config), not application code."
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              datasource:
                type: prometheus
                uid: prometheus
              # Docker Desktop's kubelet emits CFS throttle metrics at the pod-cgroup level
              # (label pod=..., no container= label), so the selector filters on pod only.
              expr: 'sum(rate(container_cpu_cfs_throttled_periods_total{namespace="petclinic-bench", pod=~"petclinic.*"}[1m])) / sum(rate(container_cpu_cfs_periods_total{namespace="petclinic-bench", pod=~"petclinic.*"}[1m]))'
              instant: true
              range: false
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params: [0.2]
  - orgId: 1
    name: chaos-queue-backpressure
    folder: chaos
    interval: 30s
    rules:
      - uid: chaos-queue-backpressure
        title: QueueBackpressure
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          service: petclinic
        annotations:
          summary: Kafka consumer lag is climbing — work is queuing faster than it drains (backpressure), invisible to request metrics
          augmentation: "Augmentation signal: the synchronous HTTP request/error metrics stay nominal because the producing path returns immediately; only the Kafka consumer lag (kafka_consumer_fetch_manager_records_lag_max) shows the async backlog growing faster than the slow consumer drains it — backpressure on the queue tier."
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              datasource:
                type: prometheus
                uid: prometheus
              expr: 'max(kafka_consumer_fetch_manager_records_lag_max{service="petclinic"})'
              instant: true
              range: false
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params: [500]
  - orgId: 1
    name: chaos-gc-thrashing
    folder: chaos
    interval: 30s
    rules:
      - uid: chaos-gc-thrashing
        title: GcThrashing
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          service: petclinic
        annotations:
          summary: The JVM is spending most of its wall-clock time in stop-the-world GC — latency spikes with no DB, downstream, deadlock, or CPU-limit cause
          augmentation: "Augmentation signal: request p99 spikes but the thread dump shows RUNNABLE (not deadlocked) threads and the CPU is busy-but-un-throttled; only the GC-pause-time rate (rate(jvm_gc_pause_seconds_sum)) and the high allocation rate localize the cause to a GC death spiral on a pressured heap."
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              datasource:
                type: prometheus
                uid: prometheus
              expr: 'sum(rate(jvm_gc_pause_seconds_sum{service="petclinic"}[1m]))'
              instant: true
              range: false
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params: [0.2]
