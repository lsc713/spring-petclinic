        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          service: petclinic
        annotations:
          summary: petclinic 5xx ratio over threshold (error-ratio, no usable app trace)
          dashboard: "Prometheus: rate(http_server_requests_seconds_count{outcome=SERVER_ERROR})"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              datasource:
                type: prometheus
                uid: prometheus
              expr: 'sum(rate(http_server_requests_seconds_count{outcome="SERVER_ERROR"}[1m])) / sum(rate(http_server_requests_seconds_count[1m]))'
              instant: true
              range: false
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
