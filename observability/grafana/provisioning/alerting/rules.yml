apiVersion: 1

groups:
  - orgId: 1
    name: chaos-classA
    folder: chaos
    interval: 30s
    rules:
      - uid: classa-owner-search-npe
        title: ClassAOwnerSearchNPE
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          service: petclinic
        annotations:
          alertname: ClassAOwnerSearchNPE
          summary: Owner-search NullPointerException (Class A) detected in petclinic
          logs: "Loki: {service=\"petclinic\"} |= \"NullPointerException\""
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              refId: A
              datasource:
                type: loki
                uid: loki
              expr: 'count_over_time({service="petclinic"} |= "NullPointerException" [5m])'
              queryType: range
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
  - orgId: 1
    name: chaos-latency
    folder: chaos
    interval: 30s
    rules:
      - uid: chaos-latency-saturation
        title: LatencySaturation
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          service: petclinic
        annotations:
          summary: Owner-search p99 latency over threshold (latency-saturation, no exception)
          dashboard: "Prometheus: http_server_requests_seconds p99 for uri=/owners"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              datasource:
                type: prometheus
                uid: prometheus
              expr: 'histogram_quantile(0.99, sum by (le) (rate(http_server_requests_seconds_bucket{uri="/owners"}[1m])))'
              instant: true
              range: false
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params: [0.1]
  - orgId: 1
    name: chaos-error-ratio
    folder: chaos
    interval: 30s
    rules:
      - uid: chaos-error-ratio-no-trace
        title: ErrorRatioNoTrace
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          service: petclinic
        annotations:
          summary: petclinic 5xx ratio over threshold (error-ratio, no usable app trace)
          dashboard: "Prometheus: rate(http_server_requests_seconds_count{outcome=SERVER_ERROR})"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              datasource:
                type: prometheus
                uid: prometheus
              expr: 'sum(rate(http_server_requests_seconds_count{outcome="SERVER_ERROR"}[1m])) / sum(rate(http_server_requests_seconds_count[1m]))'
              instant: true
              range: false
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params: [0.1]
  - orgId: 1
    name: chaos-silent-corruption
    folder: chaos
    interval: 30s
    rules:
      - uid: chaos-silent-corruption
        title: SilentCorruption
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          service: petclinic
        annotations:
          summary: Owner-search returned wrong results (silent corruption — HTTP 200, no exception, no 5xx)
          oracle: "petclinic_correctness_violations_total{check=ownerSearch} — only the correctness oracle surfaces this class"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              datasource:
                type: prometheus
                uid: prometheus
              expr: 'sum(increase(petclinic_correctness_violations_total{check="ownerSearch"}[1m]))'
              instant: true
              range: false
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
  - orgId: 1
    name: chaos-infra
    folder: chaos
    interval: 30s
    rules:
      - uid: chaos-infra-db-down
        title: InfraDbDown
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          service: petclinic
          category: infrastructure
        annotations:
          alertname: InfraDbDown
          summary: Owner-details read failing with a database-connectivity error (DataAccessResourceFailureException / Connection refused)
          triage: "Route to infrastructure / DBA. Do NOT open an application code PR — the 5xx carries a stack trace but its root cause is DB connectivity (ConnectException), not an app defect. Misdiagnosis trap (AC A13)."
          logs: "Loki: {service=\"petclinic\"} |= \"DataAccessResourceFailureException\""
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              refId: A
              datasource:
                type: loki
                uid: loki
              expr: 'count_over_time({service="petclinic"} |= "DataAccessResourceFailureException" [5m])'
              queryType: range
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
  - orgId: 1
    name: chaos-thread-saturation
    folder: chaos
    interval: 30s
    rules:
      - uid: chaos-thread-pool-saturation
        title: ThreadPoolSaturation
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          service: petclinic
        annotations:
          summary: Tomcat worker pool saturated (busy threads at configured max, no cause in metrics)
          threaddump: "Augmentation signal: GET /actuator/threaddump — N threads parked in ActiveChaosFaults.maybeBlockWorker localize the saturation."
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              datasource:
                type: prometheus
                uid: prometheus
              expr: 'max(tomcat_threads_busy_threads{service="petclinic"}) / max(tomcat_threads_config_max_threads{service="petclinic"})'
              instant: true
              range: false
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params: [0.9]
  - orgId: 1
    name: chaos-deadlock
    folder: chaos
    interval: 30s
    rules:
      - uid: chaos-deadlock-detected
        title: DeadlockDetected
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          service: petclinic
        annotations:
          summary: JVM deadlock detected by the petclinic deadlock probe (invisible to latency/error metrics)
          threaddump: "Augmentation signal: GET /actuator/threaddump — the BLOCKED thread cycle localizes which monitors/threads are deadlocked."
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              datasource:
                type: prometheus
                uid: prometheus
              expr: 'max(petclinic_deadlocked_threads{service="petclinic"})'
              instant: true
              range: false
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
  - orgId: 1
    name: chaos-downstream
    folder: chaos
    interval: 30s
    rules:
      - uid: chaos-downstream-latency
        title: DownstreamLatency
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          service: petclinic
        annotations:
          summary: Owner-details p99 latency over threshold — slow, but the metric does not say WHERE
          trace: "Augmentation signal: the distributed trace in Tempo localizes the slow span to the downstream /delay call (vs the fast JDBC span)."
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              datasource:
                type: prometheus
                uid: prometheus
              expr: 'histogram_quantile(0.99, sum by (le) (rate(http_server_requests_seconds_bucket{uri="/owners/{ownerId}",service="petclinic"}[1m])))'
              instant: true
              range: false
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params: [1]
  - orgId: 1
    name: chaos-query-plan
    folder: chaos
    interval: 30s
    rules:
      - uid: chaos-query-plan-regression
        title: QueryPlanRegression
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          service: petclinic
        annotations:
          summary: Owner-search query regressed to a Seq Scan (slow, but the latency metric does not say why)
          explain: "Augmentation signal: the EXPLAIN plan logged to Loki ({service=\"petclinic\"} |= \"Seq Scan on owners\") localizes the cause — a leading-wildcard LIKE cannot use the last_name index."
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              datasource:
                type: prometheus
                uid: prometheus
              expr: 'max(petclinic_query_seqscan{check="ownerSearch",service="petclinic"})'
              instant: true
              range: false
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
  - orgId: 1
    name: chaos-k8s-events
    folder: chaos
    interval: 30s
    rules:
      - uid: chaos-kube-oom-killed
        title: KubeOOMKilled
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: A pod was OOMKilled by the kernel — the app log just stops, no stack trace
          event: "Augmentation signal: OOMKilled is not in the k8s event stream (the kubelet emits no OOM event); it lives in pod status, surfaced via kube-state-metrics (kube_pod_container_status_last_terminated_reason{reason=\"OOMKilled\"}). The cause is a kernel memory-limit kill (infrastructure), not an application defect."
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              datasource:
                type: prometheus
                uid: prometheus
              expr: 'max_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled", namespace="petclinic-bench"}[5m])'
              instant: true
              range: false
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
      - uid: chaos-kube-failed-scheduling
        title: KubeFailedScheduling
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: A pod cannot be scheduled — no app logs exist at all, the instance never started
          event: "Augmentation signal: the scheduler event ({job=\"k8s-events\"} |= \"FailedScheduling\") names the cause as unsatisfiable resource requests (infrastructure)."
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              refId: A
              datasource:
                type: loki
                uid: loki
              expr: 'count_over_time({job="k8s-events"} |= `FailedScheduling` [5m])'
              queryType: instant
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
      - uid: chaos-kube-pod-evicted
        title: KubePodEvicted
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: A pod was evicted — in-flight requests dropped with no application error
          event: "Augmentation signal: the eviction event ({job=\"k8s-events\"} |= \"Evicted\") names the cause as a pod eviction (infrastructure), not app logic."
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              refId: A
              datasource:
                type: loki
                uid: loki
              expr: 'count_over_time({job="k8s-events"} |= `Evicted` [5m])'
              queryType: instant
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
