        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          service: petclinic
        annotations:
          summary: Owner-search query regressed to a Seq Scan (slow, but the latency metric does not say why)
          explain: "Augmentation signal: the EXPLAIN plan logged to Loki ({service=\"petclinic\"} |= \"Seq Scan on owners\") localizes the cause — a leading-wildcard LIKE cannot use the last_name index."
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              datasource:
                type: prometheus
                uid: prometheus
