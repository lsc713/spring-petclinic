  - orgId: 1
    name: chaos-k8s-events
    folder: chaos
    interval: 30s
    rules:
      - uid: chaos-kube-oom-killed
        title: KubeOOMKilled
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: A pod was OOMKilled by the kernel — the app log just stops, no stack trace
          event: "Augmentation signal: OOMKilled is not in the k8s event stream (the kubelet emits no OOM event); it lives in pod status, surfaced via kube-state-metrics (kube_pod_container_status_last_terminated_reason{reason=\"OOMKilled\"}). The cause is a kernel memory-limit kill (infrastructure), not an application defect."
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              datasource:
                type: prometheus
                uid: prometheus
              expr: 'max_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled", namespace="petclinic-bench"}[5m])'
              instant: true
              range: false
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
      - uid: chaos-kube-failed-scheduling
        title: KubeFailedScheduling
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: A pod cannot be scheduled — no app logs exist at all, the instance never started
          event: "Augmentation signal: the scheduler event ({job=\"k8s-events\"} |= \"FailedScheduling\") names the cause as unsatisfiable resource requests (infrastructure)."
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              refId: A
              datasource:
                type: loki
                uid: loki
              expr: 'count_over_time({job="k8s-events"} |= `FailedScheduling` [5m])'
              queryType: instant
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
      - uid: chaos-kube-pod-evicted
        title: KubePodEvicted
        condition: C
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: A pod was evicted — in-flight requests dropped with no application error
          event: "Augmentation signal: the eviction event ({job=\"k8s-events\"} |= \"Evicted\") names the cause as a pod eviction (infrastructure), not app logic."
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              refId: A
              datasource:
                type: loki
                uid: loki
              expr: 'count_over_time({job="k8s-events"} |= `Evicted` [5m])'
              queryType: instant
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            model:
