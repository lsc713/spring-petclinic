apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy-events
  namespace: petclinic-bench
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy-events
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy-events
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy-events
subjects:
  - kind: ServiceAccount
    name: alloy-events
    namespace: petclinic-bench
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-events
  namespace: petclinic-bench
data:
  config.alloy: |
    // Watch Kubernetes events cluster-wide and ship them to the host Loki.
    loki.source.kubernetes_events "all" {
      forward_to = [loki.process.events.receiver]
    }

    loki.process "events" {
      // Stamp a stable stream label so alerts/smoke can select the event stream.
      stage.static_labels {
        values = {
          job = "k8s-events",
        }
      }
      forward_to = [loki.write.host.receiver]
    }

    loki.write "host" {
      endpoint {
        // Docker Desktop k8s pods reach the host (docker-compose Loki) via host.docker.internal.
        url = "http://host.docker.internal:3100/loki/api/v1/push"
      }
    }

    // OOMKilled is not in the k8s event stream (the kubelet emits no OOM event); it lives in
    // pod status, which kube-state-metrics exposes as a metric. Scrape KSM and remote-write to
    // the host Prometheus so the KubeOOMKilled alert can fire. See k8s/kube-state-metrics.yaml.
    prometheus.scrape "ksm" {
      targets = [{
        __address__ = "kube-state-metrics.petclinic-bench.svc:8080",
      }]
      forward_to      = [prometheus.remote_write.host.receiver]
      scrape_interval = "15s"
    }

    // CPU CFS throttling is exposed by cAdvisor in the kubelet, not by KSM. Discover the node
    // and scrape its /metrics/cadvisor over https with the pod's service-account token, keep
    // only the CFS series (cAdvisor is high-cardinality), then remote-write to the host
    // Prometheus so the CpuThrottled alert can fire. See k8s/petclinic-deployment.yaml (cpu limit).
    discovery.kubernetes "nodes" {
      role = "node"
    }

    prometheus.scrape "cadvisor" {
      targets           = discovery.kubernetes.nodes.targets
      scheme            = "https"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      metrics_path      = "/metrics/cadvisor"
      scrape_interval   = "15s"
      tls_config {
        insecure_skip_verify = true
      }
      forward_to = [prometheus.relabel.cadvisor_keep.receiver]
    }

    prometheus.relabel "cadvisor_keep" {
      rule {
        source_labels = ["__name__"]
        regex         = "container_cpu_cfs_throttled_periods_total|container_cpu_cfs_periods_total|container_cpu_usage_seconds_total"
        action        = "keep"
      }
      forward_to = [prometheus.remote_write.host.receiver]
    }

    prometheus.remote_write "host" {
      endpoint {
        url = "http://host.docker.internal:9090/api/v1/write"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy-events
  namespace: petclinic-bench
  labels:
    app: alloy-events
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alloy-events
  template:
    metadata:
      labels:
        app: alloy-events
    spec:
      serviceAccountName: alloy-events
      containers:
        - name: alloy
          image: grafana/alloy:v1.6.1
          args:
            - run
            - /etc/alloy/config.alloy
            - --server.http.listen-addr=0.0.0.0:12345
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
      volumes:
        - name: config
          configMap:
            name: alloy-events
