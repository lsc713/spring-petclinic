apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy-events
  namespace: petclinic-bench
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy-events
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy-events
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy-events
subjects:
  - kind: ServiceAccount
    name: alloy-events
    namespace: petclinic-bench
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-events
  namespace: petclinic-bench
data:
  config.alloy: |
    // Watch Kubernetes events cluster-wide and ship them to the host Loki.
    loki.source.kubernetes_events "all" {
      forward_to = [loki.process.events.receiver]
    }

    loki.process "events" {
      // Stamp a stable stream label so alerts/smoke can select the event stream.
      stage.static_labels {
        values = {
          job = "k8s-events",
        }
      }
      forward_to = [loki.write.host.receiver]
    }

    loki.write "host" {
      endpoint {
        // Docker Desktop k8s pods reach the host (docker-compose Loki) via host.docker.internal.
        url = "http://host.docker.internal:3100/loki/api/v1/push"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy-events
  namespace: petclinic-bench
  labels:
    app: alloy-events
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alloy-events
  template:
    metadata:
      labels:
        app: alloy-events
    spec:
      serviceAccountName: alloy-events
      containers:
        - name: alloy
          image: grafana/alloy:v1.6.1
          args:
            - run
            - /etc/alloy/config.alloy
            - --server.http.listen-addr=0.0.0.0:12345
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
      volumes:
        - name: config
          configMap:
            name: alloy-events
