apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
  namespace: petclinic-bench
  labels:
    app: petclinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: petclinic
  template:
    metadata:
      labels:
        app: petclinic
    spec:
      containers:
        - name: petclinic
          image: spring-petclinic:w7
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: chaos
          # No -Xmx override: the JRE sizes the heap to a fraction of this limit (default
          # MaxRAMPercentage), so the JVM boots well within it. The oomKill fault allocates
          # NATIVE (off-heap) memory, which the JVM does not bound, so resident memory still
          # climbs past the limit and the kernel OOM-kills the container (app-blind SIGKILL).
          # See OomKillEndpoint.
          # A 1-core CPU limit is ample for boot and steady state; the cpuThrottle fault
          # spawns 4 busy-loop threads (~4 cores of demand), so the kernel CFS scheduler
          # throttles the container against this cap. CPU usage then sits pinned at ~1 core
          # (looks fine) while container_cpu_cfs_throttled_* climbs — the only signal of the
          # cause. See CpuBurner.
          resources:
            requests:
              cpu: "250m"
              memory: "768Mi"
            limits:
              cpu: "1"
              memory: "768Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: petclinic
  namespace: petclinic-bench
spec:
  selector:
    app: petclinic
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: management
      port: 8081
      targetPort: 8081
