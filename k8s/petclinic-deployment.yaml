apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
  namespace: petclinic-bench
  labels:
    app: petclinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: petclinic
  template:
    metadata:
      labels:
        app: petclinic
    spec:
      containers:
        - name: petclinic
          image: spring-petclinic:w5d
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: chaos
          # No -Xmx override: Paketo's memory calculator sizes the heap to fit this limit so
          # the JVM boots cleanly. The oomKill fault allocates NATIVE (off-heap) memory, which
          # the calculator does not count, so resident memory still climbs past the limit and
          # the kernel OOM-kills the container (app-blind SIGKILL). See OomKillEndpoint.
          resources:
            requests:
              memory: "768Mi"
            limits:
              memory: "768Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: petclinic
  namespace: petclinic-bench
spec:
  selector:
    app: petclinic
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: management
      port: 8081
      targetPort: 8081
