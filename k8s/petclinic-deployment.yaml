apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
  namespace: petclinic-bench
  labels:
    app: petclinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: petclinic
  template:
    metadata:
      labels:
        app: petclinic
    spec:
      containers:
        - name: petclinic
          image: spring-petclinic:w5d
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: chaos
            # -Xmx ABOVE the pod memory limit so the OOM-kill fault produces a kernel
            # cgroup OOM-kill (SIGKILL, app-blind) instead of a JVM OutOfMemoryError.
            # Paketo honors a user-provided -Xmx and skips its memory calculator's -Xmx.
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx1g"
          resources:
            requests:
              memory: "512Mi"
            limits:
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: petclinic
  namespace: petclinic-bench
spec:
  selector:
    app: petclinic
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: management
      port: 8081
      targetPort: 8081
