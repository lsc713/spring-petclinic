# W5d E3 Evicted signal. A literal "Evicted" event (reason=Evicted) is produced only by the
# kubelet's eviction manager, NOT by the policy/v1 Eviction API — that is a graceful delete
# that emits a "Killing" event, which also fires on every normal rollout and is not an
# infrastructure signal. Node-pressure eviction is unsafe to induce locally, so this probe
# triggers a SAFE, per-pod eviction by exceeding an emptyDir sizeLimit: the kubelet evicts
# just this pod with reason=Evicted, leaving the node and the app pod untouched.
apiVersion: v1
kind: Pod
metadata:
  name: evicted-probe
  namespace: petclinic-bench
spec:
  restartPolicy: Never
  containers:
    - name: filler
      image: busybox:1.36
      # Write past the 16Mi emptyDir limit; the kubelet then evicts this pod.
      command: ["sh", "-c", "dd if=/dev/zero of=/scratch/blob bs=1M count=200; sleep 3600"]
      resources:
        requests:
          ephemeral-storage: "8Mi"
        limits:
          ephemeral-storage: "16Mi"
      volumeMounts:
        - name: scratch
          mountPath: /scratch
  volumes:
    - name: scratch
      emptyDir:
        sizeLimit: "16Mi"
