# W5d E1 OOMKilled signal fallback. On Docker Desktop the kubelet does NOT emit an
# OOMKilled event into the Kubernetes event stream — the reason lives only in the pod's
# container status (status.containerStatuses[].lastState.terminated.reason). kube-state-
# metrics exposes that status as the metric kube_pod_container_status_last_terminated_reason
# {reason="OOMKilled"}, which the in-cluster Alloy scrapes and remote-writes to the host
# Prometheus so the KubeOOMKilled alert can fire. Only pod metrics are collected.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
  namespace: petclinic-bench
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-state-metrics
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-state-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: petclinic-bench
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: petclinic-bench
  labels:
    app: kube-state-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-state-metrics
  template:
    metadata:
      labels:
        app: kube-state-metrics
    spec:
      serviceAccountName: kube-state-metrics
      containers:
        - name: kube-state-metrics
          image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.14.0
          args:
            # Only pod metrics are needed for the OOMKilled last-terminated-reason signal.
            - --resources=pods
          ports:
            - name: http-metrics
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
  namespace: petclinic-bench
  labels:
    app: kube-state-metrics
spec:
  selector:
    app: kube-state-metrics
  ports:
    - name: http-metrics
      port: 8080
      targetPort: 8080
